[project]
name = "realty-athena-agent"
version = "0.1.0"
description = "Athena — your digital secretary. Learns your style, remembers everything, runs the show."
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2.0",
    "langchain>=0.3.0",
    "langchain-openai>=0.3.0",
    "httpx>=0.28.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "sqlalchemy>=2.0.0",
    "psutil>=5.0.0",
    "mem0ai>=2.0.0",
]

[project.optional-dependencies]
browser-use = ["browser-use>=0.1.0"]
obscura = []  # Binary install: https://github.com/h4ckf0r0day/obscura
agent-reach = ["agent-reach>=1.0.0"]
web = [
    "beautifulsoup4>=4.0.0",
    "httpx>=0.28.0",
    "lxml>=5.0.0",
]
all = [
    "browser-use>=0.1.0",
    "agent-reach>=1.0.0",
    "beautifulsoup4>=4.0.0",
    "lxml>=5.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["hermes", "hermes.*"]

