[project]
name = "realty-hermes-agent"
version = "0.1.0"
description = "Hermes-style persistent agent for RealtyAI — learns user, controls system via NL"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2.0",
    "langchain>=0.3.0",
    "langchain-openai>=0.3.0",
    "httpx>=0.28.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "sqlalchemy>=2.0.0",
    "psutil>=5.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["hermes", "hermes.*"]
