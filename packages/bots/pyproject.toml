[project]
name = "athena-bots"
version = "0.1.0"
description = "Athena multi-channel bot adapters (Telegram, Slack)"
requires-python = ">=3.11"
dependencies = [
    "python-telegram-bot>=21.0",
    "slack-sdk>=3.27",
    "slack-bolt>=1.18",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
where = ["src"]
