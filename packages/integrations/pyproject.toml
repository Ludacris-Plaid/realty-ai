[project]
name = "realty-ai-integrations"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
    "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
include = ["integrations", "integrations.*"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
