services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: realty-postgres
    environment:
      POSTGRES_USER: realty
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: realty_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - infra

  redis:
    image: redis:7-alpine
    container_name: realty-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - infra

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: realty-litellm
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://realty:realty_local_dev@postgres:5432/realty_ai
      POSTGRES_PORT: 5433
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./infrastructure/litellm:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--config"
      - "/app/config/config.yaml"
      - "--port"
      - "4000"
    profiles:
      - infra

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: realty-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: $DATABASE_URL
      REDIS_URL: $REDIS_URL
      LLM_API_BASE: $LLM_API_BASE
      LLM_API_KEY: $LLM_API_KEY
      LLM_DEFAULT_MODEL: $LLM_DEFAULT_MODEL
      CORS_ORIGINS: $CORS_ORIGINS
      AUTH_SECRET_KEY: $AUTH_SECRET_KEY
    volumes:
      - ./apps/api:/app
      - ./packages:/packages

volumes:
  pgdata:
