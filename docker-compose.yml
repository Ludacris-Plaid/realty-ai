services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: realty-postgres
    environment:
      POSTGRES_USER: realty
      POSTGRES_PASSWORD: realty_local_dev
      POSTGRES_DB: realty_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: realty-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: realty-litellm
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://realty:realty_local_dev@postgres:5432/realty_ai
      POSTGRES_PORT: 5433
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./infrastructure/litellm:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--config"
      - "/app/config/config.yaml"
      - "--port"
      - "4000"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: realty-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://realty:realty_local_dev@postgres:5432/realty_ai
      REDIS_URL: redis://redis:6379/0
      LLM_API_BASE: http://litellm:4000
      LLM_API_KEY: anything
      LLM_DEFAULT_MODEL: fast-model
      LLM_LOCAL_MODEL: local-realty-model
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: realty-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  pgdata:
