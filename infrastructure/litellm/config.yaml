model_list:

  # ─── Local llama.cpp — runs on your RTX 4060 ──────────────────────────
  - model_name: local-realty-model
    litellm_params:
      model: openai/local-realty-model
      api_base: http://host.docker.internal:8000/v1
      api_key: not-needed
      rpm: 30
    model_info:
      mode: completion
      supports_function_calling: true
      supports_vision: false

  # ─── Premium reasoning — Claude 3.7 Sonnet ────────────────────────────
  - model_name: premium-reasoning
    litellm_params:
      model: claude-3-7-sonnet-20250219
      api_key: os.environ/ANTHROPIC_API_KEY
      rpm: 10
    model_info:
      mode: chat
      supports_function_calling: true
      supports_vision: true

  # ─── Fast / cheap — GPT-4.1 Mini ──────────────────────────────────────
  - model_name: fast-model
    litellm_params:
      model: gpt-4.1-mini
      api_key: os.environ/OPENAI_API_KEY
      rpm: 100
    model_info:
      mode: chat
      supports_function_calling: true
      supports_vision: true

  # ─── Premium cheap — Gemini 2.5 Flash ─────────────────────────────────
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      rpm: 100
    model_info:
      mode: chat
      supports_function_calling: true
      supports_vision: true


litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 300

general_settings:
  database_url: postgresql://realty:realty_local_dev@postgres:5432/realty_ai
  master_key: os.environ/LITELLM_MASTER_KEY
