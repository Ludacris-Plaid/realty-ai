services:
  - type: web
    name: realty-ai-api
    env: python
    repo: https://github.com/Ludacris-Plaid/realty-ai
    branch: main
    buildCommand: pip install -e packages/ai packages/database packages/integrations && pip install -e apps/api[dev]
    startCommand: cd apps/api && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realty-ai-db
          property: connectionString
      - key: REDIS_URL
        value: redis://redistogo:pass@host:6379
      - key: LLM_API_BASE
        value: https://api.openai.com/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_DEFAULT_MODEL
        value: openai/gpt-4o-mini
      - key: CORS_ORIGINS
        value: https://realty-e0vhn9ov6-jims-projects-5c5fd212.vercel.app
      - key: AUTH_SECRET_KEY
        generateValue: true

databases:
  - name: realty-ai-db
    plan: free
    region: ohio
    postgresMajorVersion: 16
